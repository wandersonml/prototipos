<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protótipos - Caixa Reconhecimento de Receitas</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .content {
            padding: 40px 30px;
        }
        .prototype-list {
            list-style: none;
        }
        .prototype-item {
            margin-bottom: 20px;
        }
        .prototype-item a {
            display: block;
            padding: 16px 20px;
            background: #f5f5f5;
            border-left: 4px solid #667eea;
            text-decoration: none;
            color: #333;
            border-radius: 4px;
            transition: all 0.3s ease;
            font-weight: 500;
        }
        .prototype-item a:hover {
            background: #efefef;
            border-left-color: #764ba2;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            transform: translateX(4px);
        }
        .prototype-item small {
            display: block;
            color: #666;
            font-size: 12px;
            margin-top: 4px;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 30px;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Caixa - Reconhecimento de Receitas</h1>
            <p>Protótipos interativos - SEBRAE</p>
        </div>
        <div class="content">
            <a href="../" class="back-link">← Voltar para todos os protótipos</a>
            
            <ul class="prototype-list">
                <li class="prototype-item">
                    <a href="guia-reconhecimento.html">
                        📋 Guia de Reconhecimento
                        <small>Documentação e orientações sobre reconhecimento de receitas</small>
                    </a>
                </li>
                <li class="prototype-item">
                    <a href="relatorio-reconhecimento-receitas.html">
                        📈 Relatório de Reconhecimento de Receitas
                        <small>Visualização de dados e métricas de receitas</small>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</body>
</html>
