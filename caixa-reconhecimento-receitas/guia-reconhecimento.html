const fmt  = v => v.toLocaleString('pt-BR', { style:'currency', currency:'BRL' });

/* Classifica a cor da barra conforme % execução */
function pctClass(pct) {
  if (pct >= 100) return { fill:'fill-full', text:'pct-full' };
  if (pct >= 75)  return { fill:'fill-high', text:'pct-high' };
  if (pct >= 40)  return { fill:'fill-mid',  text:'pct-mid'  };
  return { fill:'fill-low', text:'pct-low' };
}

/* Converte string DD/MM/YYYY em Date */
function parseDate(str) {
  if (!str) return null;
  const [d, m, y] = str.split('/');
  return new Date(Number(y), Number(m) - 1, Number(d));
}

/* Calcula diferença em dias entre duas datas (positivo = atraso) */
function diffDias(prevista, real) {
  const p = parseDate(prevista);
  const r = parseDate(real);
  if (!p || !r) return null;
  return Math.round((r - p) / 86400000);
}

/* Badge de prazo de execução */
function PrazoBadge({ prevista, real }) {
  if (!real) {
    return (
      <span style={{display:'inline-flex',alignItems:'center',gap:3,background:'#e8f0fe',border:'1px solid #c5d5f7',borderRadius:4,padding:'2px 6px',fontSize:10,color:'#1a56db',fontWeight:600,whiteSpace:'nowrap'}}>
        🔵 Em andamento
      </span>
    );
  }
  const diff = diffDias(prevista, real);
  if (diff === null) return null;
  if (diff <= 0) {
    const adiantado = diff < 0 ? ` (${Math.abs(diff)}d antes)` : '';
    return (
      <span style={{display:'inline-flex',alignItems:'center',gap:3,background:'#d1e7dd',border:'1px solid #a3cfbb',borderRadius:4,padding:'2px 6px',fontSize:10,color:'#0a5132',fontWeight:600,whiteSpace:'nowrap'}}>
        ✅ No prazo{adiantado}
      </span>
    );
  }
  const cor = diff <= 7  ? { bg:'#fff3cd', border:'#ffe082', text:'#7a5100' }
            : diff <= 20 ? { bg:'#ffe5cc', border:'#ffba7a', text:'#7c3d00' }
            :              { bg:'#f8d7da', border:'#f5c2c7', text:'#7a1021' };
  return (
    <span style={{display:'inline-flex',alignItems:'center',gap:3,background:cor.bg,border:`1px solid ${cor.border}`,borderRadius:4,padding:'2px 6px',fontSize:10,color:cor.text,fontWeight:600,whiteSpace:'nowrap'}}>
      ⚠️ {diff}d de atraso
    </span>
  );
}

/* Badge de parcela e tipo de reconhecimento */
function ParcelaBadge({ parcela, tipo }) {
  const isIntegral = tipo === 'Integral';
  return (
    <div style={{display:'flex',flexDirection:'column',gap:3,minWidth:90}}>
      <div style={{display:'flex',alignItems:'center',gap:4}}>
        <span style={{fontSize:10,color:'#777'}}>Parcela:</span>
        <span style={{
          fontFamily:'monospace',fontWeight:700,fontSize:12,
          background:'#e8f4fd',border:'1px solid #b6d9f0',
          borderRadius:4,padding:'1px 6px',color:'#006494',letterSpacing:.5
        }}>{parcela}</span>
      </div>
      <div>
        <span style={{
          display:'inline-block',padding:'2px 7px',borderRadius:4,fontSize:10,fontWeight:700,
          background: isIntegral ? '#d1e7dd' : '#fff3cd',
          border:     isIntegral ? '1px solid #a3cfbb' : '1px solid #ffe082',
          color:      isIntegral ? '#0a5132' : '#7a5100',
        }}>
          {isIntegral ? '● Integral' : '◑ Parcial'}
        </span>
      </div>
    </div>
  );
}

/* Mini barra de progresso de execução */
function ExecBar({ pedido, executado }) {
  const pct     = pedido > 0 ? Math.min((executado / pedido) * 100, 100) : 0;
  const saldo   = pedido - executado;
  const cls     = pctClass(pct);
  const parcial = pct < 100;
  return (
    <div className="exec-cell">
      {/* Linha de valores */}
      <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'#555',marginBottom:2}}>
        <span>Pedido: <strong style={{color:'#333'}}>{fmt(pedido)}</strong></span>
        <span>Exec.: <strong style={{color:'#333'}}>{fmt(executado)}</strong></span>
      </div>
      {/* Barra */}
      <div className="progress-track">
        <div className={`progress-fill ${cls.fill}`} style={{width:`${pct}%`}} />
      </div>
      {/* Rodapé da barra */}
      <div className="exec-footer">
        <span className={`exec-pct ${cls.text}`}>{fmtN(pct)}%</span>
        <span className="exec-saldo">
          Saldo: <span style={{color: saldo > 0 ? '#856404' : '#198754'}}>{fmt(saldo)}</span>
        </span>
        <span className={`partial-badge ${parcial ? 'parcial' : 'completo'}`}>
          {parcial ? 'Parcial' : '100%'}
        </span>
      </div>
    </div>
  );
}

  const [busca,    setBusca]        = useState('');
  const [guiaGerada, setGuiaGerada] = useState(false);
  const [modalJust,  setModalJust]  = useState(null);
  const [justTemp,   setJustTemp]   = useState('');
  const [modalConfirm, setModalConfirm] = useState(false);
  const [erroIds,  setErroIds]      = useState([]);

  const totalAptos = servicos.filter(s => s.status === 'Aguardando Integração').length;
  const totalBloq  = servicos.filter(s => s.status === 'Bloqueado Manualmente').length;
  const totalSel   = servicos.filter(s => s.selecionado).length;
  const valorExec  = servicos.filter(s => s.selecionado).reduce((a,s) => a + s.executado, 0);
  const parciais   = servicos.filter(s => s.selecionado && s.executado < s.pedido).length;

  const lista = useMemo(() => {
    let l = servicos;
    if (filtro === 'aptos')      l = l.filter(s => s.status === 'Aguardando Integração');
    if (filtro === 'bloqueados') l = l.filter(s => s.status === 'Bloqueado Manualmente');
    if (busca.trim()) {
      const b = busca.toLowerCase();
      l = l.filter(s =>
        s.fontePagadora.toLowerCase().includes(b) ||
        s.nRecibo.includes(b) ||
        s.descricao.toLowerCase().includes(b) ||
        s.centroCusto.includes(b)
      );
    }
    return l;
  }, [servicos, filtro, busca]);




  const toggleItem = id => {
    const s = servicos.find(x => x.id === id);
    if (s.selecionado) {
      setJustTemp(s.justificativa || '');
      setModalJust(id);
    } else {
      setServicos(prev => prev.map(x => x.id === id
        ? {...x, selecionado:true, status:'Aguardando Integração', justificativa:''}
        : x));
      setErroIds(prev => prev.filter(e => e !== id));
    }
  };

  const confirmarBloqueio = () => {
    if (!justTemp.trim()) return;
    setServicos(prev => prev.map(x => x.id === modalJust
      ? {...x, selecionado:false, status:'Bloqueado Manualmente', justificativa:justTemp}
      : x));
    setModalJust(null); setJustTemp('');
  };





  const gerarGuia = () => {
    if (totalSel === 0) { alert('Selecione ao menos um serviço.'); return; }
    setErroIds([]); setModalConfirm(true);
  };

  const confirmarGeracao = () => { setModalConfirm(false); setGuiaGerada(true); };

  const reativar = id =>
    setServicos(prev => prev.map(x => x.id === id
      ? {...x, selecionado:true, status:'Aguardando Integração', justificativa:''}
      : x));

  const servicoModal = modalJust ? servicos.find(x => x.id === modalJust) : null;

  const checkCol = filtro !== 'bloqueados';
  const extraCols = filtro !== 'aptos';
  const acaoCols  = filtro === 'bloqueados';

  /* totais do rodapé da tabela */
  const totPedido  = lista.reduce((a,s) => a + s.pedido,    0);
  const totExec    = lista.reduce((a,s) => a + s.executado, 0);
  const totSaldo   = totPedido - totExec;
  const totPct     = totPedido > 0 ? (totExec / totPedido) * 100 : 0;

  return (
    <>
      {/* ── SIDEBAR ─────────────────────────────────────────── */}
      <div className="sidebar">
        <div className="sidebar-logo"><span>SEBRAE</span></div>
        <nav>
          <div className="nav-section">Consultas</div>
          <a href="#" className="nav-item">📈 Vendas</a>
          <div className="nav-section">Fechamentos</div>
          <a href="#" className="nav-item">🔒 Fechar Caixa</a>
          <a href="#" className="nav-item">📤 Exportação RM</a>
          <a href="#" className="nav-item">🔍 Consultar</a>
          <div className="nav-section">Contas</div>
          <a href="#" className="nav-item">📋 Extrato</a>
          <div className="nav-section">Reconhecimentos</div>
          <a href="#" className="nav-item active">💲 Gerar Guia</a>
          <a href="#" className="nav-item">📄 Guias RM</a>
          <a href="#" className="nav-item">🔄 Alterações de Centro de Custo</a>
          <a href="#" className="nav-item">↩ Alt. Solicitações de Estorno</a>
          <div className="nav-section">Geral</div>
          <a href="#" className="nav-item">📊 Relatórios</a>
          <div className="nav-section">Cadastros</div>
          <a href="#" className="nav-item">⚙️ Cadastros</a>
        </nav>
      </div>

      {/* ── MAIN ─────────────────────────────────────────────── */}
      <div className="main-area">
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:18,color:'#555'}}>☰</span>
            <button className="btn btn-primary">🔍 Recibo n°</button>
            <input placeholder="Buscar" style={{border:'1px solid #ccc',borderRadius:4,padding:'4px 8px',fontSize:12,width:180}} />
          </div>
          <div style={{display:'flex',alignItems:'center',gap:16,fontSize:12,color:'#555'}}>
            <span>📍 Unidade:</span>
            <span>👤 WANDERSON MOREIRA LOURENÇO ▾</span>
          </div>
        </div>
        <div className="breadcrumb">Home / <strong>Gerar guia</strong></div>

        <div className="content">

          {/* ── FILTROS ─────────────────────────────────────── */}
          <div className="card">
            <div className="card-header">
              <span style={{fontSize:14,fontWeight:700,color:'#006494'}}>💲 Gerar Reconhecimento de Receitas</span>
            </div>
            <div className="form-row">
              <div className="form-group">
                <label>Serviços prestados até: *</label>
                <div className="form-control">
                  <input value={dataAte} onChange={e => setDataAte(e.target.value)} style={{width:90}} />
                  <span style={{color:'#aaa'}}>📅</span>
                </div>
              </div>
              <div className="form-group">
                <label>Departamento/Caixa:</label>
                <div className="form-control" style={{minWidth:220}}>
                  <span style={{flex:1,fontSize:12}}>CAIXA SEBRAE-INTERNET</span>
                  <span style={{color:'#aaa',fontSize:11}}>✕ ▾</span>
                </div>
              </div>
              <button className="btn btn-primary"
                onClick={() => { setGuiaGerada(false); setFiltro('aptos'); setBusca(''); setErroIds([]); }}>
                🔍 Visualizar Guia
              </button>
            </div>
          </div>

          {/* ── PAINEL PRINCIPAL ────────────────────────────── */}
          <div className="card">
            <div className="card-header">
              <span style={{fontSize:13,fontWeight:600,color:'#333'}}>
                📄 {guiaGerada ? '✅ Guia de Reconhecimento Gerada com sucesso!' : 'Pré-visualização da guia de reconhecimento'}
              </span>
              {!guiaGerada && (
                <button className="btn btn-success" onClick={gerarGuia}>
                  ✔ Gerar Guia de Reconhecimento
                </button>
              )}
            </div>

            {guiaGerada && (
              <div className="guia-banner">
                ✅ {totalSel} serviço(s) reconhecido(s) — Valor executado: {fmt(valorExec)}
                {totalBloq > 0 && <span style={{color:'#842029',fontWeight:400,fontSize:12}}> &nbsp;|&nbsp; {totalBloq} bloqueado(s) manualmente</span>}
              </div>
            )}

            {/* Sumário */}
            <div className="summary-bar">
              <div><strong>Prestados até:</strong> {dataAte}</div>
              <div><strong>Caixa:</strong> CAIXA SEBRAE-INTERNET</div>
              <div><strong>Responsável:</strong> WANDERSON MOREIRA LOURENÇO</div>
              <div className="summary-stats">
                <span>Aptos: <strong style={{color:'#198754'}}>{totalAptos}</strong></span>
                <span>Bloqueados: <strong style={{color:'#dc3545'}}>{totalBloq}</strong></span>
                <span>Selecionados: <strong style={{color:'#006494'}}>{totalSel}</strong></span>
                {parciais > 0 &&
                  <span style={{background:'#fff3cd',border:'1px solid #ffe082',borderRadius:4,padding:'1px 7px',color:'#856404',fontWeight:700,fontSize:11}}>
                    ⚠ {parciais} execução(ões) parcial(is)
                  </span>
                }
                <span>Total executado: <strong style={{color:'#198754'}}>{fmt(valorExec)}</strong></span>
              </div>
            </div>

            {/* Legenda execução */}
            <div style={{margin:"0 16px 4px",padding:"6px 12px",background:"#f8f9fa",border:"1px solid #e9ecef",borderRadius:"4px 4px 0 0",display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
              <span style={{fontSize:10,color:"#777",fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>Legenda — % Execução:</span>
              {[{fill:"#198754",label:"100% — Totalmente executado"},{fill:"#0d6efd",label:"≥ 75% — Bem executado"},{fill:"#fd7e14",label:"≥ 40% — Execução parcial"},{fill:"#dc3545",label:"< 40% — Execução baixa"}].map(({fill,label})=>(
                <span key={label} style={{display:"flex",alignItems:"center",gap:5,fontSize:11,color:"#444"}}>
                  <span style={{display:"inline-block",width:26,height:7,borderRadius:10,background:fill}}/>
                  {label}
                </span>
              ))}
            </div>
            {/* Legenda prazo de execução */}
            <div style={{margin:"0 16px 6px",padding:"6px 12px",background:"#f8f9fa",border:"1px solid #e9ecef",borderTop:"1px dashed #dee2e6",borderRadius:"0 0 4px 4px",display:"flex",alignItems:"center",gap:20,flexWrap:"wrap"}}>
              <span style={{fontSize:10,color:"#777",fontWeight:600,textTransform:"uppercase",letterSpacing:.5}}>Legenda — Prazo de Execução:</span>
              {[
                { bg:'#d1e7dd', border:'#a3cfbb', text:'#0a5132', label:'✅ No prazo — executado dentro do prazo previsto' },
                { bg:'#e8f0fe', border:'#c5d5f7', text:'#1a56db', label:'🔵 Em andamento — data real ainda não registrada' },
                { bg:'#fff3cd', border:'#ffe082', text:'#7a5100', label:'⚠️ Atraso leve — até 7 dias' },
                { bg:'#ffe5cc', border:'#ffba7a', text:'#7c3d00', label:'⚠️ Atraso moderado — 8 a 20 dias' },
                { bg:'#f8d7da', border:'#f5c2c7', text:'#7a1021', label:'⚠️ Atraso crítico — acima de 20 dias' },
              ].map(({ bg, border, text, label }) => (
                <span key={label} style={{display:'flex',alignItems:'center',gap:5,fontSize:11,color:'#444'}}>
                  <span style={{display:'inline-block',padding:'1px 7px',borderRadius:4,background:bg,border:`1px solid ${border}`,color:text,fontSize:10,fontWeight:700,whiteSpace:'nowrap'}}>
                    {label.split(' — ')[0]}
                  </span>
                  <span style={{color:'#666'}}>{label.split(' — ')[1]}</span>
                </span>
              ))}
            </div>

            {/* Linha de filtros/ações */}
            <div className="filter-row">
              <div className="tab-group">
                <button
                  className={`tab-btn ${filtro==='aptos' ? 'tab-aptos' : 'tab-inactive'}`}
                  onClick={() => setFiltro('aptos')}>
                  ✅ Aptos para reconhecer
                </button>
                <button
                  className={`tab-btn ${filtro==='bloqueados' ? 'tab-bloqueados' : 'tab-inactive'}`}
                  onClick={() => setFiltro('bloqueados')}>
                  🚫 Bloqueados
                  {totalBloq > 0 &&
                    <span style={{marginLeft:5,background:filtro==='bloqueados'?'rgba(255,255,255,.3)':'#dc3545',color:'#fff',borderRadius:'50%',padding:'1px 5px',fontSize:10,fontWeight:700}}>
                      {totalBloq}
                    </span>}
                </button>
                <button
                  className={`tab-btn ${filtro==='todos' ? 'tab-todos' : 'tab-inactive'}`}
                  onClick={() => setFiltro('todos')}>
                  📋 Todos
                </button>
              </div>

              <div className="search-box">
                <span style={{color:'#aaa',fontSize:12}}>🔍</span>
                <input value={busca} onChange={e => setBusca(e.target.value)}
                  placeholder="Pesquisar por fonte pagadora, recibo, descrição..." />
                {busca &&
                  <button onClick={() => setBusca('')}
                    style={{background:'none',border:'none',color:'#aaa',fontSize:14,cursor:'pointer'}}>✕</button>}
              </div>


              {filtro === 'bloqueados' && (
                <div className="alert alert-warning" style={{margin:0,padding:'4px 10px',fontSize:11}}>
                  ⚠️ Clique em "Reativar" para devolver o serviço para reconhecimento
                </div>
              )}
            </div>

            {erroIds.length > 0 && (
              <div className="alert alert-danger">
                ⚠️ <strong>{erroIds.length} serviço(s) sem justificativa.</strong> Preencha a justificativa para prosseguir.
              </div>
            )}

            {/* ── TABELA ───────────────────────────────────── */}
            <div className="table-wrap">
              <table>
                <thead>
                  <tr>
                    {checkCol && <th style={{width:30}}></th>}
                    <th style={{minWidth:165}}>Nº Recibo / Dados</th>
                    <th style={{minWidth:150}}>Fonte Pagadora</th>
                    <th style={{minWidth:220}}>Descrição do Item</th>
                    <th style={{minWidth:105}}>Parcela / Tipo</th>
                    <th style={{minWidth:170}}>Execução</th>
                    <th style={{minWidth:120}}>Centro de Custo</th>
                    {extraCols && <th style={{minWidth:185}}>Justificativa</th>}
                    {acaoCols  && <th style={{minWidth:80,textAlign:'center'}}>Ação</th>}
                  </tr>
                </thead>
                <tbody>
                  {lista.length === 0 && (
                    <tr><td colSpan={9} style={{padding:28,textAlign:'center',color:'#aaa'}}>
                      Nenhum serviço encontrado com os filtros aplicados.
                    </td></tr>
                  )}
                  {lista.map((s, idx) => {
                    const temErro = erroIds.includes(s.id);
                    const rowBg   = temErro ? '#ffeaea'
                      : s.status === 'Bloqueado Manualmente' ? '#fff8f8'
                      : idx % 2 === 0 ? '#fff' : '#f9f9f9';
                    return (
                      <tr key={s.id} style={{background:rowBg}}>
                        {checkCol &&
                          <td><input type="checkbox" checked={s.selecionado} onChange={() => toggleItem(s.id)} /></td>}
                        <td>
                          <div className="recibo-info">Nº do recibo: {s.nRecibo}</div>
                          <div className="recibo-detail">
                            Nº movimento: {s.nMovimento}<br/>
                            Chave origem: {s.chaveOrigem}<br/>
                            Data da venda: {s.dataVenda}<br/>
                            <span style={{color:'#555'}}>Dt. Exec. Prevista: <strong>{s.dataExecucaoPrevista}</strong></span><br/>
                            <span style={{color:'#555'}}>Dt. Exec. Real: <strong>{s.dataExecucaoReal || '—'}</strong></span>
                          </div>
                          <div style={{marginTop:4}}>
                            <PrazoBadge prevista={s.dataExecucaoPrevista} real={s.dataExecucaoReal} />
                          </div>
                        </td>
                        <td style={{fontSize:11}}>{s.fontePagadora}</td>
                        <td style={{lineHeight:1.5,color:'#444',fontSize:11}}>{s.descricao}</td>
                        <td style={{verticalAlign:'top'}}>
                          <ParcelaBadge parcela={s.parcela} tipo={s.tipoReconhecimento} />
                        </td>
                        <td>
                          <ExecBar pedido={s.pedido} executado={s.executado} />
                        </td>
                        <td style={{fontFamily:'monospace',fontSize:10,whiteSpace:'nowrap'}}>{s.centroCusto}</td>
                        {extraCols &&
                          <td style={{maxWidth:200}}>
                            {s.justificativa
                              ? <span style={{fontStyle:'italic',color:'#666',fontSize:11}}>{s.justificativa}</span>
                              : <span style={{color: temErro?'#dc3545':'#aaa', fontWeight: temErro?700:400, fontSize:11}}>
                                  {temErro ? '⚠️ Justificativa obrigatória' : '—'}
                                </span>
                            }
                          </td>}
                        {acaoCols &&
                          <td style={{textAlign:'center'}}>
                            <button className="btn btn-outline-success" style={{fontSize:11,padding:'3px 8px'}} onClick={() => reativar(s.id)}>
                              ↩ Reativar
                            </button>
                          </td>}
                      </tr>
                    );
                  })}
                </tbody>
                {lista.length > 0 && (
                  <tfoot>
                    <tr>
                      {/*
                        Colunas por modo:
                        aptos      : [check] recibo fonte descrição parcela/tipo | execução | centro                    = 7
                        todos      : [check] recibo fonte descrição parcela/tipo | execução | centro justificativa       = 8
                        bloqueados :         recibo fonte descrição parcela/tipo | execução | centro justificativa ação  = 8
                        Primeiro td (antes de Execução):
                          checkCol  → 1+1+1+1+1 = 5
                          !checkCol →   1+1+1+1 = 4
                        Último td (depois de Execução):
                          aptos      → centro(1)                        = 1
                          todos      → centro(1) + justificativa(1)     = 2
                          bloqueados → centro(1) + justificativa(1) + ação(1) = 3
                      */}
                      <td colSpan={checkCol ? 5 : 4}
                        style={{textAlign:'right',fontSize:11,fontWeight:700}}>
                        Total de serviços: {lista.length}
                      </td>
                      {/* Coluna Execução no rodapé */}
                      <td style={{fontSize:11}}>
                        <div style={{fontSize:10,color:'#555',marginBottom:2}}>
                          Pedido: <strong>{fmt(totPedido)}</strong> &nbsp;|&nbsp; Exec.: <strong>{fmt(totExec)}</strong>
                        </div>
                        <div className="progress-track" style={{height:5}}>
                          <div className={`progress-fill ${pctClass(totPct).fill}`} style={{width:`${totPct}%`}} />
                        </div>
                        <div style={{fontSize:10,display:'flex',justifyContent:'space-between',marginTop:2}}>
                          <span className={pctClass(totPct).text} style={{fontWeight:700}}>{fmtN(totPct)}%</span>
                          <span style={{color:'#777'}}>Saldo: <strong>{fmt(totSaldo)}</strong></span>
                        </div>
                      </td>
                      <td colSpan={acaoCols ? 3 : extraCols ? 2 : 1}></td>
                    </tr>
                  </tfoot>
                )}
              </table>
            </div>
          </div>
        </div>

        <footer>
          <span>SEBRAE © 2018 - Todos os Direitos Reservados.</span>
          <span>Versão 3.1.0</span>
        </footer>
      </div>

      {/* ── MODAL JUSTIFICATIVA ───────────────────────────────── */}
      {modalJust && servicoModal && (
        <div className="modal-overlay">
          <div className="modal" style={{width:510}}>
            <div className="modal-header">
              <span>🚫 Bloquear Serviço Manualmente</span>
              <button onClick={() => { setModalJust(null); setJustTemp(''); }}>✕</button>
            </div>
            <div className="modal-body">
              <div className="info-box">
                <div><span className="lbl">Recibo:</span> {servicoModal.nRecibo}</div>
                <div><span className="lbl">Fonte Pagadora:</span> {servicoModal.fontePagadora}</div>
                <div><span className="lbl">Valor pedido:</span> {fmt(servicoModal.pedido)} &nbsp;|&nbsp;
                     <span className="lbl">Executado:</span> {fmt(servicoModal.executado)}</div>
              </div>
              <div className="alert alert-warning" style={{marginBottom:12}}>
                ⚠️ Ao confirmar, o status será alterado para <strong>"Bloqueado Manualmente"</strong> e este serviço <strong>não será incluído</strong> na guia de reconhecimento.
              </div>
              <label className="field-label">
                Justificativa para bloqueio: <span style={{color:'#dc3545'}}>*</span>
              </label>
              <textarea className="just-input" value={justTemp}
                onChange={e => setJustTemp(e.target.value)}
                placeholder="Informe o motivo pelo qual este serviço não será reconhecido nesta guia..." />
              {!justTemp.trim() && <p className="field-error">A justificativa é obrigatória.</p>}
            </div>
            <div className="modal-footer">
              <button className="btn btn-outline" onClick={() => { setModalJust(null); setJustTemp(''); }}>Cancelar</button>
              <button className="btn btn-danger" disabled={!justTemp.trim()} onClick={confirmarBloqueio}>
                🚫 Confirmar Bloqueio
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── MODAL CONFIRMAR GERAÇÃO ───────────────────────────── */}
      {modalConfirm && (
        <div className="modal-overlay">
          <div className="modal" style={{width:440}}>
            <div className="modal-header">
              <span>✔ Confirmar Geração da Guia</span>
              <button onClick={() => setModalConfirm(false)}>✕</button>
            </div>
            <div className="modal-body">
              <div className="info-box">
                <div><span className="lbl">Status:</span> Pré-visualização da Guia</div>
                <div><span className="lbl">Serviços a reconhecer:</span> <strong style={{color:'#198754'}}>{totalSel}</strong></div>
                {parciais > 0 &&
                  <div><span className="lbl">⚠ Execuções parciais:</span> <strong style={{color:'#856404'}}>{parciais}</strong></div>}
                <div><span className="lbl">Serviços bloqueados:</span> <strong style={{color:'#dc3545'}}>{totalBloq}</strong></div>
                <div><span className="lbl">Total executado a reconhecer:</span> <strong style={{color:'#198754'}}>{fmt(valorExec)}</strong></div>
              </div>
              <p style={{fontSize:12,color:'#555'}}>
                Deseja confirmar a geração da <strong>Guia de Reconhecimento de Receitas</strong>?
                {totalBloq > 0 && <span style={{color:'#856404'}}> Os {totalBloq} serviço(s) bloqueados não serão incluídos.</span>}
              </p>
            </div>
            <div className="modal-footer">
              <button className="btn btn-outline" onClick={() => setModalConfirm(false)}>Cancelar</button>
              <button className="btn btn-success" onClick={confirmarGeracao}>✔ Confirmar e Gerar</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
